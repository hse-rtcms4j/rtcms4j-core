name: Build and Publish

on:
  push:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      publish_api: ${{ steps.check-api.outputs.publish_api }}
      publish_docker: ${{ steps.check-api.outputs.publish_docker }}

    steps:
      - name: Sync repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/build/libs/
            **/build/publications/
          retention-days: 1

      - name: Check what to publish
        id: check-api
        if: github.ref == 'refs/heads/main'
        run: |
          PUBLISH_API=true
          PUBLISH_DOCKER=true
          
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"
          
          if [[ "$COMMIT_MSG" == *"[skip api]"* ]]; then
            PUBLISH_API=false
            echo "Found [skip api] - setting PUBLISH_API=false"
          fi
          if [[ "$COMMIT_MSG" == *"[skip docker]"* ]]; then
            PUBLISH_DOCKER=false
            echo "Found [skip docker] - setting PUBLISH_DOCKER=false"
          fi
          if [[ "$COMMIT_MSG" == *"[publish only api]"* ]]; then
            PUBLISH_DOCKER=false
            echo "Found [publish only api] - setting PUBLISH_DOCKER=false"
          fi
          if [[ "$COMMIT_MSG" == *"[publish only docker]"* ]]; then
            PUBLISH_API=false
            echo "Found [publish only docker] - setting PUBLISH_API=false"
          fi
          
          echo "Final values: PUBLISH_API=$PUBLISH_API, PUBLISH_DOCKER=$PUBLISH_DOCKER"
          echo "publish_api=$PUBLISH_API" >> $GITHUB_OUTPUT
          echo "publish_docker=$PUBLISH_DOCKER" >> $GITHUB_OUTPUT

  publish-maven-central:
    name: Publish to Maven Central
    needs: build
    if: github.ref == 'refs/heads/main' && needs.build.outputs.publish_api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Sync repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYPASSWORD }}

  publish-ghcr:
    name: Publish to GHCR
    needs: build
    if: github.ref == 'refs/heads/main' && needs.build.outputs.publish_docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Sync repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GHCR
        run: ./gradlew :rtcms4j-core-server:jib --stacktrace
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
